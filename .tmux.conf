set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

unbind Up
unbind Down
unbind Left
unbind Right

unbind C-Up
unbind C-Down
unbind C-Left
unbind C-Right

set -g mouse on
set -g set-clipboard on

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Status bar colors
set -g status-bg colour5
set -g status-fg cyan
set -g status-left-style bg=colour5,fg=cyan,bold
set -g status-right-style bg=colour5,fg=cyan
set -g window-status-current-style bg=colour13,fg=black,bold
set -g pane-active-border-style fg=colour5
set -g pane-border-style fg=cyan

